    <!-- Primary Meta -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://ibare.github.io/depix/" />
    <meta property="og:title" content="Depix — A DSL that turns LLM output into visual content" />

    <!-- Canonical -->
    <link rel="canonical" href="https://ibare.github.io/depix/" />

    <!-- SPA redirect for GitHub Pages -->
    <!-- https://github.com/rafgraph/spa-github-pages -->
    <script>
      var pathSegmentsToKeep = 1; // '/depix/' = 1 segment
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
